<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Daftarkan akun mahasiswa Anda di Portal MALAKA">
    <title>Daftar Akun - Portal MALAKA</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/styles.css">
</head>

<body class="login-page-body">

    <main class="split-login-container">

        <!-- Sisi Kiri: Gambar & Sambutan -->
        <section class="login-left bg-daftar" aria-label="Sambutan Daftar Akun">
            <div class="login-left-content">
                <div class="logo-top-right">
                    <img src="images/Logo_Malaka_Education_Tulisan.png"
                        alt="Logo MALAKA Education"
                        style="width: 110px;">
                </div>
                <div class="welcome-text">
                    <h1>Halo!</h1>
                    <p>Mari Bergabung di Portal MALAKA</p>
                </div>
            </div>
        </section>

        <!-- Sisi Kanan: Form Registrasi -->
        <section class="login-right" aria-label="Form Pendaftaran Akun">
            <article class="login-role-card" style="max-width: 500px; max-height: 95vh; overflow-y: auto;">
                <div class="card-header-logo">
                    <img src="images/Logo_Malaka_Education.png"
                        alt="Logo Universitas MALAKA Education">
                </div>

                <div class="card-body-role">
                    <h2>Daftar Akun Mahasiswa</h2>

                    <form action="01-login.html" method="GET" style="margin-top: 24px;">

                        <div class="form-group">
                            <label for="nama">Nama Lengkap</label>
                            <input type="text" id="nama" class="form-control"
                                placeholder="Masukkan nama lengkap" required>
                        </div>

                        <div class="form-group">
                            <label for="nim">NIM</label>
                            <input type="text" id="nim" class="form-control"
                                placeholder="Masukkan NIM" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" class="form-control"
                                placeholder="Masukkan email aktif" required>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" class="form-control"
                                placeholder="Buat password" required>
                        </div>

                        <div class="form-group">
                            <label for="konfirmasi_password">Konfirmasi Password</label>
                            <input type="password" id="konfirmasi_password" class="form-control"
                                placeholder="Ulangi password" required>
                        </div>

                        <div class="form-group prodi-input-group">
                            <span class="prodi-label">Program Studi</span>
                            <select id="prodi" class="prodi-select" required>
                                <option value="" disabled selected>Pilih Program Studi</option>
                                <option value="ti">Teknik Informatika</option>
                                <option value="si">Sistem Informasi</option>
                                <option value="te">Teknologi Informasi</option>
                                <option value="mn">Manajemen</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="angkatan">Tahun Angkatan</label>
                            <select id="angkatan" class="form-control" required>
                                <option value="" disabled selected>Pilih Tahun Angkatan</option>
                                <option value="2026">2026</option>
                                <option value="2025">2025</option>
                                <option value="2024">2024</option>
                                <option value="2023">2023</option>
                                <option value="2022">2022</option>
                                <option value="2021">2021</option>
                                <option value="2020">2020</option>
                                <option value="2019">2019</option>
                            </select>
                        </div>

                        <button type="submit" id="btn-daftar" class="btn btn-blue w-100">
                            <i class="fas fa-user-plus"></i> Daftar Sekarang
                        </button>
                    </form>

                    <div class="auth-footer">
                        Sudah punya akun?
                        <a href="01-login.html">Login</a>
                    </div>
                </div>
            </article>
        </section>

    </main>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
